<nav *ngIf="logueado" class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm rounded">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Menú</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuNav"
      aria-controls="menuNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menuNav">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item" *ngFor="let item of items">
          <a class="nav-link" [routerLink]="item.ruta">{{ item.nombre }}</a>
        </li>
      </ul>
      <button class="btn btn-outline-light btn-sm" (click)="cerrarSesion()">
        <i class="bi bi-box-arrow-right me-1"></i> Cerrar sesión
      </button>
    </div>
  </div>
</nav>

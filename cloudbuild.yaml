steps:
  # Paso 1: Construir imagen desde la carpeta backend
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/proypers25-backend', '.']
    dir: backend

  # Paso 2: Push de la imagen
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/proypers25-backend']

  # Paso 3: Desplegar a Cloud Run en la región correcta
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - proypers25-backend
      - --image
      - gcr.io/$PROJECT_ID/proypers25-backend
      - --platform
      - managed
      - --region
      - europe-west1
      - --allow-unauthenticated

images:
  - gcr.io/$PROJECT_ID/proypers25-backend

options:
  logging: CLOUD_LOGGING_ONLY






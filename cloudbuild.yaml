substitutions:
  _IMAGE_TAG: manual

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'build',
        '--pull',
        '--no-cache',
        '-t',
        'southamerica-west1-docker.pkg.dev/$PROJECT_ID/backend-repo/backend-image:${_IMAGE_TAG}',
        '.'
      ]
    dir: backend

  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        docker run --rm \
          southamerica-west1-docker.pkg.dev/$PROJECT_ID/backend-repo/backend-image:${_IMAGE_TAG} \
          sh -c "test -f /usr/src/app/server.js && test -f /usr/src/app/routes/investmentsSummary.route.js && grep -q 'investments-dashboard' /usr/src/app/server.js && grep -q 'investments-dashboard' /usr/src/app/routes/investmentsSummary.route.js"

  - name: 'gcr.io/cloud-builders/docker'
    args:
      ['push', 'southamerica-west1-docker.pkg.dev/$PROJECT_ID/backend-repo/backend-image:${_IMAGE_TAG}']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      [
        'run', 'deploy', 'proypers25-backend',
        '--image', 'southamerica-west1-docker.pkg.dev/$PROJECT_ID/backend-repo/backend-image:${_IMAGE_TAG}',
        '--platform', 'managed',
        '--region', 'southamerica-west1',
        '--allow-unauthenticated',
        '--command', 'node',
        '--args', 'server.js',
        '--set-env-vars', 'APP_COMMIT_SHA=${_IMAGE_TAG}'
      ]

images:
  - 'southamerica-west1-docker.pkg.dev/$PROJECT_ID/backend-repo/backend-image:${_IMAGE_TAG}'

options:
  logging: CLOUD_LOGGING_ONLY

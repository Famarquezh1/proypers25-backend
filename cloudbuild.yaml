steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/proypers25-backend', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/proypers25-backend']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - proypers25-backend
      - --image
      - gcr.io/$PROJECT_ID/proypers25-backend
      - --platform
      - managed
      - --region
      - europe-west1
      - --allow-unauthenticated

images:
  - gcr.io/$PROJECT_ID/proypers25-backend

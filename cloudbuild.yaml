substitutions:
  _IMAGE_TAG: manual
  _REGION: southamerica-west1
  _REPOSITORY: backend-repo
  _IMAGE: backend-image

steps:
  - id: build-backend-image
    name: 'gcr.io/cloud-builders/docker'
    dir: backend
    args:
      - 'build'
      - '--pull'
      - '--no-cache'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:${_IMAGE_TAG}'
      - '.'

  - id: validate-image-contents
    name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        set -eu
        IMAGE="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:${_IMAGE_TAG}"
        docker run --rm --entrypoint sh "$$IMAGE" -c '
          test -f /usr/src/app/server.js
          test -f /usr/src/app/routes/investmentsSummary.route.js
          test -f /usr/src/app/routes/spotLiveDashboard.route.js
          test -f /usr/src/app/services/spotLiveEvidence.js
          test -f /usr/src/app/routes/admin.route.js
          grep -q "investments-dashboard" /usr/src/app/routes/investmentsSummary.route.js
          grep -q "spot-live-dashboard" /usr/src/app/routes/spotLiveDashboard.route.js
          grep -q "spotLiveDashboardRoute" /usr/src/app/server.js
          node --check /usr/src/app/services/spotLiveEvidence.js
          node --check /usr/src/app/routes/spotLiveDashboard.route.js
          node --check /usr/src/app/routes/controlledRealSpot.route.js
          node /usr/src/app/tests/spotCycleObservability.test.js
          node /usr/src/app/tests/spotLiveEvidence.test.js
        '

  - id: push-backend-image
    name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:${_IMAGE_TAG}'

  - id: deploy-cloud-run
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'proypers25-backend'
      - '--project'
      - '$PROJECT_ID'
      - '--image'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:${_IMAGE_TAG}'
      - '--platform'
      - 'managed'
      - '--region'
      - '${_REGION}'
      - '--allow-unauthenticated'
      - '--command'
      - 'node'
      - '--args'
      - 'server.js'
      - '--set-env-vars'
      - 'APP_COMMIT_SHA=${_IMAGE_TAG}'

  - id: route-traffic-to-latest
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'services'
      - 'update-traffic'
      - 'proypers25-backend'
      - '--project'
      - '$PROJECT_ID'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--to-latest'

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:${_IMAGE_TAG}'

options:
  logging: CLOUD_LOGGING_ONLY

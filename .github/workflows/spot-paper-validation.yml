name: Spot paper signal validation

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

permissions:
  contents: read

concurrency:
  group: spot-paper-signal-validation
  cancel-in-progress: false

jobs:
  validate:
    name: Record and evaluate simulated Spot signals
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run paper-only signal lifecycle
        working-directory: backend
        env:
          GOOGLE_CLOUD_PROJECT: proypers2025
          GCLOUD_PROJECT: proypers2025
          BINANCE_SPOT_PAPER_MAX_DOCS: '250'
          BINANCE_SPOT_PAPER_TIMEOUT_MS: '12000'
        run: node scripts/run-spot-paper-validation.js

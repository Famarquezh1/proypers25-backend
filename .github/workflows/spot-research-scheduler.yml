name: Spot research scheduler

on:
  workflow_dispatch:
    inputs:
      task:
        description: Task to run
        required: true
        default: all
        type: choice
        options:
          - discovery
          - quant
          - adaptive
          - promotion
          - governance
          - all
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: read

concurrency:
  group: spot-research-consolidated
  cancel-in-progress: false

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Run productive Spot research cycle
        env:
          BACKEND_URL: ${{ vars.PROYPERS_BACKEND_URL || 'https://proypers25-backend-h4put26qmq-tl.a.run.app' }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          MANUAL_TASK: ${{ inputs.task || 'scheduled' }}
        run: |
          set -euo pipefail
          test -n "$CRON_SECRET"
          echo "event=$GITHUB_EVENT_NAME task=$MANUAL_TASK backend=$BACKEND_URL"
          MARKET_RESULT='{}'

          call_endpoint() {
            local endpoint="$1"
            local body="$2"
            curl --silent --show-error --fail-with-body --retry 2 --max-time 2100 \
              -X POST "$BACKEND_URL$endpoint" \
              -H "Content-Type: application/json" \
              -H "x-cron-secret: $CRON_SECRET" \
              --data "$body"
          }

          run_market_opportunity() {
            echo "MARKET_OPPORTUNITY_START bands=8_to_40 mode=observe_and_feed_quant"
            MARKET_RESULT=$(call_endpoint "/internal/cron/binance/spot-market-opportunity" '{"researchLimit":10}')
            printf '%s\n' "$MARKET_RESULT" | jq '{ok,id,version,breadth,research_symbols,top_winners:(.top_winners[:10]),learning_mode,no_order_created}'
          }

          run_gem_radar() {
            echo "GEM_RADAR_START universe=dynamic max_research=10 quant=v6_productive"
            RADAR_RESULT=$(call_endpoint "/internal/cron/binance/spot-new-assets-discovery" '{"maxResearch":10,"runQuant":true,"quantLimit":5000,"interval":"5m","feeRate":0.001,"slippageRate":0.0005}')
            printf '%s\n' "$RADAR_RESULT" | jq '{ok,duration_ms,discovery:{baseline:.discovery.baseline,universe_size:.discovery.universe_size,new_assets_detected:.discovery.new_assets_detected},radar:{id:.radar.id,version:.radar.version,universe_size:.radar.universe_size,unique_symbol_count:.radar.unique_symbol_count,research_candidate_count:.radar.research_candidate_count,research_symbols:.radar.research_symbols,quant_run_id:.radar.quant_run_id,quant_promotion_eligible:.radar.quant_promotion_eligible}}'
          }

          run_quant_and_promotion() {
            CORE='["BTCUSDT","ETHUSDT","SOLUSDT","XRPUSDT","TONUSDT","BNBUSDT","ADAUSDT","DOGEUSDT","LINKUSDT","AVAXUSDT"]'
            MARKET_SYMBOLS=$(printf '%s' "$MARKET_RESULT" | jq -c '.research_symbols // []')
            SYMBOLS=$(jq -nc --argjson core "$CORE" --argjson market "$MARKET_SYMBOLS" '$market + $core | unique | .[:12]')
            QUANT_BODY=$(jq -nc --argjson symbols "$SYMBOLS" '{symbols:$symbols,interval:"5m",limit:5000,feeRate:0.001,slippageRate:0.0005}')

            echo "QUANT_START mode=productive_v6 folds=4 universe=$(printf '%s' "$SYMBOLS" | jq length) market_winners_included=$(printf '%s' "$MARKET_SYMBOLS" | jq length)"
            QUANT_RESULT=$(call_endpoint "/internal/cron/binance/spot-quant-research" "$QUANT_BODY")
            printf '%s\n' "$QUANT_RESULT" | jq '{ok,id,version,history,strategy_families,walk_forward_folds,safeguards,costs,promotion_eligible,no_eligible_champion,selection,selected_evidence}'

            ACCEPTED=$(printf '%s' "$QUANT_RESULT" | jq -r '.selection.accepted_symbol_count // 0')
            ANALYZED=$(printf '%s' "$QUANT_RESULT" | jq -r '.selection.analyzed_count // 0')
            SELECTED=$(printf '%s' "$QUANT_RESULT" | jq -r '.selection.selected_symbol // empty')
            if [ "$ACCEPTED" -le 0 ] || [ "$ANALYZED" -le 0 ]; then
              echo "Quant research produced no accepted/analyzed symbols" >&2
              exit 1
            fi

            PAPER_SYMBOLS=$(printf '%s' "$SYMBOLS" | jq -c '.[0:5]')
            echo "PAPER_REFRESH_START selected_symbol=${SELECTED:-none} candidate_count=$(printf '%s' "$PAPER_SYMBOLS" | jq length)"
            PAPER_BODY=$(jq -nc --argjson symbols "$PAPER_SYMBOLS" --arg selected "$SELECTED" '{preferredSymbols:($symbols + (if ($selected|length)>0 then [$selected] else [] end) | unique),source:"quant_research_market_breadth_v1"}')
            PAPER_RESULT=$(call_endpoint "/internal/cron/binance/spot-paper-validation" "$PAPER_BODY")
            printf '%s\n' "$PAPER_RESULT" | jq '{ok,paper_only,positions_closed,intents_created,intents_rejected,opened_symbols}'

            echo "PROMOTION_START"
            PROMOTION_RESULT=$(call_endpoint "/internal/cron/binance/spot-strategy-promotion" '{}')
            printf '%s\n' "$PROMOTION_RESULT" | jq '{ok,state,entry_allowed,symbol,reasons,paper,champion_run_id}'
            echo "QUANT_PAPER_PROMOTION_DONE"
          }

          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            case "$MANUAL_TASK" in
              governance) call_endpoint "/internal/cron/binance/spot-cost-governance" '{}' ;;
              discovery) run_market_opportunity; run_gem_radar ;;
              adaptive) call_endpoint "/internal/cron/binance/spot-adaptive-strategy" '{}' ;;
              promotion) call_endpoint "/internal/cron/binance/spot-strategy-promotion" '{}' ;;
              quant) run_market_opportunity; run_quant_and_promotion ;;
              all)
                call_endpoint "/internal/cron/binance/spot-cost-governance" '{}'
                run_market_opportunity
                run_gem_radar
                call_endpoint "/internal/cron/binance/spot-adaptive-strategy" '{}'
                run_quant_and_promotion
                ;;
            esac
            exit 0
          fi

          MINUTE=$(date -u +%M)
          HOUR=$(date -u +%H)
          run_market_opportunity
          run_gem_radar

          if [ "$MINUTE" = "00" ]; then
            call_endpoint "/internal/cron/binance/spot-adaptive-strategy" '{}'
            call_endpoint "/internal/cron/binance/spot-strategy-promotion" '{}'
          fi

          if [ "$MINUTE" = "00" ] && [ $((10#$HOUR % 6)) -eq 0 ]; then
            call_endpoint "/internal/cron/binance/spot-cost-governance" '{}'
          fi

          if [ "$MINUTE" = "00" ]; then
            STATUS=$(curl --silent --show-error --fail-with-body --retry 2 --max-time 60 \
              -H "x-cron-secret: $CRON_SECRET" \
              "$BACKEND_URL/internal/spot-cost-governance/status" || echo '{}')
            MODE=$(printf '%s' "$STATUS" | jq -r '.config.current_mode // "NORMAL"')
            MULTIPLIER=$(printf '%s' "$STATUS" | jq -r '.config.research_frequency_multiplier // 1')
            PERIOD=$((2 * MULTIPLIER))
            if [ "$MODE" != "PAUSED" ] && [ $((10#$HOUR % PERIOD)) -eq 0 ]; then
              run_quant_and_promotion
            fi
          fi

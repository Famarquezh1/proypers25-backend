name: Spot research scheduler

on:
  workflow_dispatch:
    inputs:
      task:
        description: Task to run
        required: true
        default: all
        type: choice
        options:
          - discovery
          - quant
          - adaptive
          - promotion
          - governance
          - all
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: read

concurrency:
  group: spot-research-consolidated
  cancel-in-progress: false

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Run cost-aware Spot research cycle
        env:
          BACKEND_URL: ${{ vars.PROYPERS_BACKEND_URL || 'https://proypers25-backend-h4put26qmq-tl.a.run.app' }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          MANUAL_TASK: ${{ inputs.task || 'scheduled' }}
        run: |
          set -euo pipefail
          test -n "$CRON_SECRET"

          call_endpoint() {
            local endpoint="$1"
            local body="$2"
            curl --fail-with-body --retry 2 --max-time 780 \
              -X POST "$BACKEND_URL$endpoint" \
              -H "Content-Type: application/json" \
              -H "x-cron-secret: $CRON_SECRET" \
              --data "$body"
          }

          run_quant_and_promotion() {
            call_endpoint "/internal/cron/binance/spot-quant-research" '{"symbols":["BTCUSDT","ETHUSDT","SOLUSDT","XRPUSDT","TONUSDT"],"interval":"5m","limit":1000,"feeRate":0.001}'
            call_endpoint "/internal/cron/binance/spot-strategy-promotion" '{}'
          }

          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            case "$MANUAL_TASK" in
              governance) call_endpoint "/internal/cron/binance/spot-cost-governance" '{}' ;;
              discovery) call_endpoint "/internal/cron/binance/spot-new-assets-discovery" '{"maxResearch":8,"runQuant":true,"quantLimit":1000}' ;;
              adaptive) call_endpoint "/internal/cron/binance/spot-adaptive-strategy" '{}' ;;
              promotion) call_endpoint "/internal/cron/binance/spot-strategy-promotion" '{}' ;;
              quant) run_quant_and_promotion ;;
              all)
                call_endpoint "/internal/cron/binance/spot-cost-governance" '{}'
                call_endpoint "/internal/cron/binance/spot-new-assets-discovery" '{"maxResearch":8,"runQuant":true,"quantLimit":1000}'
                call_endpoint "/internal/cron/binance/spot-adaptive-strategy" '{}'
                run_quant_and_promotion
                ;;
            esac
            exit 0
          fi

          MINUTE=$(date -u +%M)
          HOUR=$(date -u +%H)

          call_endpoint "/internal/cron/binance/spot-new-assets-discovery" '{"maxResearch":8,"runQuant":true,"quantLimit":1000}'

          if [ "$MINUTE" = "00" ]; then
            call_endpoint "/internal/cron/binance/spot-adaptive-strategy" '{}'
            call_endpoint "/internal/cron/binance/spot-strategy-promotion" '{}'
          fi

          if [ "$MINUTE" = "00" ] && [ $((10#$HOUR % 6)) -eq 0 ]; then
            call_endpoint "/internal/cron/binance/spot-cost-governance" '{}'
          fi

          if [ "$MINUTE" = "00" ]; then
            STATUS=$(curl --fail-with-body --retry 2 --max-time 60 \
              -H "x-cron-secret: $CRON_SECRET" \
              "$BACKEND_URL/internal/spot-cost-governance/status" || echo '{}')
            MODE=$(printf '%s' "$STATUS" | jq -r '.config.current_mode // "NORMAL"')
            MULTIPLIER=$(printf '%s' "$STATUS" | jq -r '.config.research_frequency_multiplier // 1')
            PERIOD=$((2 * MULTIPLIER))
            if [ "$MODE" != "PAUSED" ] && [ $((10#$HOUR % PERIOD)) -eq 0 ]; then
              run_quant_and_promotion
            fi
          fi
name: Controlled Spot Exit Tests

on:
  pull_request:
    branches:
      - main
    paths:
      - "backend/services/controlledSpotExitExecutor.js"
      - "backend/services/spotPositionLifecycle.js"
      - "backend/services/spotAccountReconciliation.js"
      - "backend/services/adaptiveSpotStrategyController.js"
      - "backend/services/spotStrategyPromotionController.js"
      - "backend/services/spotCycleObservability.js"
      - "backend/routes/controlledRealSpot.route.js"
      - "backend/routes/adaptiveSpotStrategy.route.js"
      - "backend/routes/spotStrategyPromotion.route.js"
      - "backend/routes/systemHealth.route.js"
      - "backend/routes/spotCostGovernance.route.js"
      - "backend/routes/velasCron.js"
      - "backend/tests/controlledSpotExitExecutor.test.js"
      - "backend/tests/spotPositionLifecycle.test.js"
      - "backend/tests/spotStrategyPromotion.test.js"
      - "backend/tests/spotCycleObservability.test.js"
      - "backend/server.js"
      - ".github/workflows/controlled-spot-exit-tests.yml"
  push:
    branches:
      - main
      - feat/controlled-real-spot-exits
    paths:
      - "backend/services/controlledSpotExitExecutor.js"
      - "backend/services/spotPositionLifecycle.js"
      - "backend/services/spotAccountReconciliation.js"
      - "backend/services/adaptiveSpotStrategyController.js"
      - "backend/services/spotStrategyPromotionController.js"
      - "backend/services/spotCycleObservability.js"
      - "backend/routes/controlledRealSpot.route.js"
      - "backend/routes/adaptiveSpotStrategy.route.js"
      - "backend/routes/spotStrategyPromotion.route.js"
      - "backend/routes/systemHealth.route.js"
      - "backend/routes/spotCostGovernance.route.js"
      - "backend/routes/velasCron.js"
      - "backend/tests/controlledSpotExitExecutor.test.js"
      - "backend/tests/spotPositionLifecycle.test.js"
      - "backend/tests/spotStrategyPromotion.test.js"
      - "backend/tests/spotCycleObservability.test.js"
      - "backend/server.js"
      - ".github/workflows/controlled-spot-exit-tests.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Syntax checks
        run: |
          node --check backend/services/controlledSpotExitExecutor.js
          node --check backend/services/spotPositionLifecycle.js
          node --check backend/services/spotAccountReconciliation.js
          node --check backend/services/adaptiveSpotStrategyController.js
          node --check backend/services/spotStrategyPromotionController.js
          node --check backend/services/spotCycleObservability.js
          node --check backend/routes/controlledRealSpot.route.js
          node --check backend/routes/adaptiveSpotStrategy.route.js
          node --check backend/routes/spotStrategyPromotion.route.js
          node --check backend/routes/systemHealth.route.js
          node --check backend/routes/spotCostGovernance.route.js
          node --check backend/routes/velasCron.js
          node --check backend/server.js

      - name: Verify one real execution route
        run: |
          count=$(grep -R "router.post('/internal/cron/binance/spot-real-execution'" backend/routes --include='*.js' | wc -l)
          echo "Real execution route definitions: $count"
          test "$count" -eq 1

      - name: Controlled Spot exit unit tests
        run: |
          node backend/tests/controlledSpotExitExecutor.test.js
          node backend/tests/spotPositionLifecycle.test.js

      - name: Controlled strategy promotion unit tests
        run: node backend/tests/spotStrategyPromotion.test.js

      - name: Spot cycle observability unit tests
        run: node backend/tests/spotCycleObservability.test.js

name: Deploy backend to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

# Manual redeploy trigger after confirming spot-real-execution is PAUSED.
permissions:
  contents: read

concurrency:
  group: deploy-proypers25-backend
  cancel-in-progress: false

jobs:
  deploy:
    name: Cloud Build to Cloud Run
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@v4

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend regression tests
        working-directory: backend
        run: |
          node tests/spotManagedQuantityRepair.test.js
          node tests/controlledSpotExitExecutor.test.js
          node tests/controlledSpotSubmittedQuantity.test.js
          node tests/professionalInvestmentsDashboard.test.js
          node tests/spotDiscoveryIntelligence.test.js
          node tests/spotDiscoveryLongHorizon.test.js
          node --check routes/professionalInvestmentsDashboard.route.js
          node --check routes/spotDiscovery.route.js
          node --check services/spotDiscoveryIntelligence.js
          node --check services/spotDiscoveryLongHorizon.js
          node --check server.js

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: proypers2025

      - name: Confirm real Spot scheduler remains paused
        shell: bash
        run: |
          set -euo pipefail
          PROJECT="proypers2025"
          LOCATION="southamerica-east1"

          echo "Scheduler jobs visible in ${LOCATION}:"
          gcloud scheduler jobs list \
            --project="$PROJECT" \
            --location="$LOCATION" \
            --format='table(name.basename(),state,httpTarget.uri)'

          JOB=$(gcloud scheduler jobs list \
            --project="$PROJECT" \
            --location="$LOCATION" \
            --filter='name:spot-real-execution OR httpTarget.uri:spot-real-execution' \
            --format='value(name)' | head -n1)

          if [ -z "$JOB" ]; then
            echo "ERROR: spot-real-execution was not found in ${LOCATION}." >&2
            exit 1
          fi

          STATE=$(gcloud scheduler jobs describe "$JOB" \
            --project="$PROJECT" \
            --location="$LOCATION" \
            --format='value(state)' | tr -d '[:space:]' | tr '[:lower:]' '[:upper:]')

          echo "Resolved scheduler job: $JOB"
          echo "Resolved scheduler state: '$STATE'"

          if [ "$STATE" != "PAUSED" ]; then
            echo "ERROR: Scheduler must remain PAUSED before deployment; current state is '$STATE'." >&2
            exit 1
          fi

          echo "Scheduler verified PAUSED: $JOB"

      - name: Submit immutable build and deployment
        shell: bash
        run: |
          set -euo pipefail
          gcloud builds submit \
            --project=proypers2025 \
            --config=cloudbuild.yaml \
            --substitutions=_IMAGE_TAG="$GITHUB_SHA" \
            .

      - name: Diagnose failed Cloud Build or Cloud Run revision
        if: failure()
        shell: bash
        run: |
          set -u
          BUILD_ID=$(gcloud builds list --project=proypers2025 --limit=1 --sort-by='~createTime' --format='value(id)' || true)
          echo "Latest Cloud Build: ${BUILD_ID:-unavailable}"
          if [ -n "${BUILD_ID:-}" ]; then
            gcloud logging read \
              "resource.type=build AND labels.build_id=$BUILD_ID" \
              --project=proypers2025 --limit=250 --order=asc \
              --format='value(timestamp,severity,textPayload,jsonPayload.message,jsonPayload.error)' || true
          fi
          gcloud logging read \
            'resource.type="cloud_run_revision" AND resource.labels.service_name="proypers25-backend" AND severity>=ERROR' \
            --project=proypers2025 --freshness=30m --limit=100 --order=desc \
            --format='value(timestamp,severity,resource.labels.revision_name,textPayload,jsonPayload.message,jsonPayload.error)' || true

      - name: Verify professional dashboard deployment
        shell: bash
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          test -n "$CRON_SECRET"
          URL=$(gcloud run services describe proypers25-backend \
            --project=proypers2025 \
            --region=southamerica-west1 \
            --platform=managed \
            --format='value(status.url)')
          echo "Cloud Run URL: $URL"

          VERSION=$(curl --silent --show-error --fail-with-body \
            --retry 8 --retry-all-errors --retry-delay 10 "$URL/__version")
          DEPLOYED_SHA=$(jq -r '.commit // empty' <<<"$VERSION")
          test "$DEPLOYED_SHA" = "$GITHUB_SHA"
          echo "APP_COMMIT_SHA verified: $DEPLOYED_SHA"

          SUMMARY=$(curl --silent --show-error --fail-with-body \
            --retry 2 --retry-all-errors --retry-delay 5 --max-time 120 \
            -H "x-cron-secret: $CRON_SECRET" "$URL/internal/investments/summary")
          jq -e '.ok == true and (.account | type == "object") and (.assets | type == "array") and (.recent_trades | type == "array")' <<<"$SUMMARY" >/dev/null
          echo '/internal/investments/summary verified'

          LIVE=$(curl --silent --show-error --fail-with-body \
            --retry 4 --retry-all-errors --retry-delay 5 --max-time 120 \
            -H "x-cron-secret: $CRON_SECRET" "$URL/internal/spot-live/evidence")
          jq -e '.ok == true and .real_mode == true and .spot_only == true' <<<"$LIVE" >/dev/null
          echo '/internal/spot-live/evidence verified'

          DISCOVERY=$(curl --silent --show-error --fail-with-body \
            --retry 2 --retry-all-errors --retry-delay 5 --max-time 120 \
            -H "x-cron-secret: $CRON_SECRET" "$URL/internal/discovery-engine")
          jq -e '.ok == true and .mode == "SHADOW" and .real_orders_enabled == false and (.ranking | type == "array")' <<<"$DISCOVERY" >/dev/null
          echo '/internal/discovery-engine shadow mode verified'

          DASHBOARD=$(curl --silent --show-error --fail-with-body --max-time 30 "$URL/investments-dashboard")
          grep -q 'Resultado Proypers25' <<<"$DASHBOARD"
          grep -q 'Resumen de la cuenta Binance' <<<"$DASHBOARD"
          grep -q 'Gestionado por Proypers25' <<<"$DASHBOARD"
          grep -q 'Estas operaciones NO forman parte del rendimiento del bot' <<<"$DASHBOARD"
          grep -q '/internal/investments/summary' <<<"$DASHBOARD"
          grep -q '/internal/spot-live/evidence' <<<"$DASHBOARD"
          echo '/investments-dashboard professional view verified'

          DISCOVERY_DASHBOARD=$(curl --silent --show-error --fail-with-body --max-time 30 "$URL/discovery-dashboard")
          grep -q 'Discovery Engine' <<<"$DISCOVERY_DASHBOARD"
          grep -q 'Actualizar 7 días' <<<"$DISCOVERY_DASHBOARD"
          grep -q 'Extraordinarios +50%' <<<"$DISCOVERY_DASHBOARD"
          echo '/discovery-dashboard long-horizon view verified'

          PROJECT="proypers2025"
          LOCATION="southamerica-east1"
          JOB=$(gcloud scheduler jobs list \
            --project="$PROJECT" \
            --location="$LOCATION" \
            --filter='name:spot-real-execution OR httpTarget.uri:spot-real-execution' \
            --format='value(name)' | head -n1)
          test -n "$JOB"
          STATE=$(gcloud scheduler jobs describe "$JOB" \
            --project="$PROJECT" \
            --location="$LOCATION" \
            --format='value(state)' | tr -d '[:space:]' | tr '[:lower:]' '[:upper:]')
          test "$STATE" = "PAUSED"
          echo "Scheduler remains PAUSED: $JOB; no trading endpoint was invoked by deployment verification"
name: Deploy backend to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "cloudbuild.yaml"
      - ".github/workflows/deploy-cloud-run.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-proypers25-backend
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: proypers2025

      - name: Submit Cloud Build
        run: |
          gcloud builds submit \
            --project=proypers2025 \
            --config=cloudbuild.yaml \
            --substitutions=_IMAGE_TAG=${GITHUB_SHA} \
            .

      - name: Inspect deployed Cloud Run revision
        run: |
          gcloud run services describe proypers25-backend \
            --project=proypers2025 \
            --region=southamerica-west1 \
            --platform=managed \
            --format='yaml(status.url,status.latestReadyRevisionName,status.traffic,spec.template.spec.containers[0].image,spec.template.spec.containers[0].command,spec.template.spec.containers[0].args,spec.template.spec.containers[0].env)'

      - name: Verify Cloud Run service
        run: |
          URL=$(gcloud run services describe proypers25-backend \
            --project=proypers2025 \
            --region=southamerica-west1 \
            --platform=managed \
            --format="value(status.url)")
          echo "Cloud Run URL: ${URL}"
          echo "--- /__version ---"
          curl --silent --show-error --location --retry 8 --retry-delay 10 --write-out "\nHTTP %{http_code}\n" "${URL}/__version"
          echo "--- /investments-dashboard ---"
          curl --silent --show-error --location --retry 8 --retry-delay 10 --write-out "\nHTTP %{http_code}\n" "${URL}/investments-dashboard" -o /tmp/dashboard.html
          head -c 300 /tmp/dashboard.html || true
          echo
          grep -q "Proypers25" /tmp/dashboard.html

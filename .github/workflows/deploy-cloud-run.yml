name: Deploy backend to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-proypers25-backend
  cancel-in-progress: false

jobs:
  deploy:
    name: Cloud Build to Cloud Run
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: proypers2025

      - name: Submit immutable build and deployment
        shell: bash
        run: |
          set -euo pipefail
          gcloud builds submit \
            --project=proypers2025 \
            --config=cloudbuild.yaml \
            --substitutions=_IMAGE_TAG="$GITHUB_SHA" \
            .

      - name: Diagnose failed Cloud Build or Cloud Run revision
        if: failure()
        shell: bash
        run: |
          set -u
          BUILD_ID=$(gcloud builds list --project=proypers2025 --limit=1 --sort-by='~createTime' --format='value(id)' || true)
          echo "Latest Cloud Build: ${BUILD_ID:-unavailable}"
          if [ -n "${BUILD_ID:-}" ]; then
            gcloud logging read \
              "resource.type=build AND labels.build_id=$BUILD_ID" \
              --project=proypers2025 --limit=250 --order=asc \
              --format='value(timestamp,severity,textPayload,jsonPayload.message,jsonPayload.error)' || true
          fi
          gcloud logging read \
            'resource.type="cloud_run_revision" AND resource.labels.service_name="proypers25-backend" AND severity>=ERROR' \
            --project=proypers2025 --freshness=30m --limit=100 --order=desc \
            --format='value(timestamp,severity,resource.labels.revision_name,textPayload,jsonPayload.message,jsonPayload.error)' || true

      - name: Verify deployed commit and required routes
        shell: bash
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          test -n "$CRON_SECRET"
          URL=$(gcloud run services describe proypers25-backend \
            --project=proypers2025 \
            --region=southamerica-west1 \
            --platform=managed \
            --format='value(status.url)')
          echo "Cloud Run URL: $URL"

          VERSION=$(curl --silent --show-error --fail-with-body \
            --retry 8 --retry-all-errors --retry-delay 10 "$URL/__version")
          DEPLOYED_SHA=$(jq -r '.commit // empty' <<<"$VERSION")
          test "$DEPLOYED_SHA" = "$GITHUB_SHA"
          echo "APP_COMMIT_SHA verified: $DEPLOYED_SHA"

          COVERAGE=$(curl --silent --show-error --fail-with-body \
            --retry 4 --retry-all-errors --retry-delay 5 --max-time 90 \
            -H "x-cron-secret: $CRON_SECRET" "$URL/internal/investments/coverage")
          jq -e '.ok == true' <<<"$COVERAGE" >/dev/null
          echo '/internal/investments/coverage verified'

          SUMMARY=$(curl --silent --show-error --fail-with-body \
            --retry 2 --retry-all-errors --retry-delay 5 --max-time 90 \
            -H "x-cron-secret: $CRON_SECRET" "$URL/internal/investments/summary")
          jq -e '.ok == true and (.account | type == "object") and (.assets | type == "array") and (.engine.diagnosis | type == "object")' <<<"$SUMMARY" >/dev/null
          echo '/internal/investments/summary verified (Binance + Firestore dashboard source)'

          OPPORTUNITY=$(curl --silent --show-error --fail-with-body \
            --retry 2 --retry-all-errors --retry-delay 5 --max-time 2100 \
            -X POST -H 'Content-Type: application/json' \
            -H "x-cron-secret: $CRON_SECRET" --data '{"researchLimit":10}' \
            "$URL/internal/cron/binance/spot-market-opportunity")
          jq -e '.ok == true' <<<"$OPPORTUNITY" >/dev/null
          echo '/internal/cron/binance/spot-market-opportunity verified'

          CYCLE=$(curl --silent --show-error --fail-with-body \
            --retry 2 --retry-all-errors --retry-delay 5 --max-time 240 \
            -X POST -H 'Content-Type: application/json' \
            -H "x-cron-secret: $CRON_SECRET" --data '{}' \
            "$URL/internal/cron/binance/spot-real-execution")
          jq -e '.real_mode == true and .spot_only == true and (.decision_summary | type == "object") and (.evidence_id | type == "string")' <<<"$CYCLE" >/dev/null
          echo "Real Spot cycle persisted: $(jq -r '.evidence_id' <<<"$CYCLE")"

          LIVE=$(curl --silent --show-error --fail-with-body \
            --retry 4 --retry-all-errors --retry-delay 5 --max-time 120 \
            -H "x-cron-secret: $CRON_SECRET" "$URL/internal/spot-live/evidence")
          jq -e '.ok == true and .real_mode == true and .spot_only == true and (.latest_cycle | type == "object") and (.scheduler | type == "object") and (.binance | type == "object") and (.activity | type == "array")' <<<"$LIVE" >/dev/null
          test "$(jq -r '.latest_cycle.timestamp // empty' <<<"$LIVE")" != ""
          echo '/internal/spot-live/evidence verified with persisted real activity'

          DASHBOARD=$(curl --silent --show-error --fail-with-body --max-time 30 "$URL/spot-live-dashboard")
          grep -q 'Spot real · Evidencia viva' <<<"$DASHBOARD"
          grep -q '/internal/spot-live/evidence' <<<"$DASHBOARD"
          echo '/spot-live-dashboard verified'

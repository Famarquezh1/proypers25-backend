name: Deploy backend to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "cloudbuild.yaml"
      - ".github/workflows/deploy-cloud-run.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-proypers25-backend
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: proypers2025

      - name: Submit Cloud Build
        run: |
          gcloud builds submit \
            --project=proypers2025 \
            --config=cloudbuild.yaml \
            --substitutions=_IMAGE_TAG=${GITHUB_SHA} \
            .

      - name: Verify Cloud Run service
        run: |
          URL=$(gcloud run services describe proypers25-backend \
            --project=proypers2025 \
            --region=southamerica-west1 \
            --platform=managed \
            --format="value(status.url)")
          echo "Cloud Run URL: ${URL}"
          curl --fail --retry 8 --retry-delay 10 "${URL}/investments-dashboard" >/dev/null

name: Deploy backend to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-proypers25-backend
  cancel-in-progress: false

jobs:
  deploy:
    name: Cloud Build to Cloud Run
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@v4

      - name: Run managed quantity regression tests
        working-directory: backend
        run: |
          set -euo pipefail
          node --check services/spotManagedQuantityRepair.js
          node --check routes/controlledRealSpot.route.js
          node tests/spotManagedQuantityRepair.test.js
          node tests/controlledSpotExitExecutor.test.js

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: proypers2025

      - name: Confirm real Spot scheduler remains paused
        shell: bash
        run: |
          set -euo pipefail
          JOB=$(gcloud scheduler jobs list \
            --project=proypers2025 \
            --location=southamerica-east1 \
            --filter='httpTarget.uri:spot-real-execution' \
            --format='value(name)' | head -n1)
          test -n "$JOB"
          STATE=$(gcloud scheduler jobs describe "$JOB" \
            --project=proypers2025 \
            --location=southamerica-east1 \
            --format='value(state)')
          test "$STATE" = "PAUSED"
          echo "Scheduler verified PAUSED: $JOB"

      - name: Submit immutable build and deployment
        shell: bash
        run: |
          set -euo pipefail
          gcloud builds submit \
            --project=proypers2025 \
            --config=cloudbuild.yaml \
            --substitutions=_IMAGE_TAG="$GITHUB_SHA" \
            .

      - name: Diagnose failed Cloud Build or Cloud Run revision
        if: failure()
        shell: bash
        run: |
          set -u
          BUILD_ID=$(gcloud builds list --project=proypers2025 --limit=1 --sort-by='~createTime' --format='value(id)' || true)
          echo "Latest Cloud Build: ${BUILD_ID:-unavailable}"
          if [ -n "${BUILD_ID:-}" ]; then
            gcloud logging read \
              "resource.type=build AND labels.build_id=$BUILD_ID" \
              --project=proypers2025 --limit=250 --order=asc \
              --format='value(timestamp,severity,textPayload,jsonPayload.message,jsonPayload.error)' || true
          fi
          gcloud logging read \
            'resource.type="cloud_run_revision" AND resource.labels.service_name="proypers25-backend" AND severity>=ERROR' \
            --project=proypers2025 --freshness=30m --limit=100 --order=desc \
            --format='value(timestamp,severity,resource.labels.revision_name,textPayload,jsonPayload.message,jsonPayload.error)' || true

      - name: Verify deployment and controlled XEC retry
        shell: bash
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          test -n "$CRON_SECRET"
          URL=$(gcloud run services describe proypers25-backend \
            --project=proypers2025 \
            --region=southamerica-west1 \
            --platform=managed \
            --format='value(status.url)')
          echo "Cloud Run URL: $URL"

          VERSION=$(curl --silent --show-error --fail-with-body \
            --retry 8 --retry-all-errors --retry-delay 10 "$URL/__version")
          DEPLOYED_SHA=$(jq -r '.commit // empty' <<<"$VERSION")
          test "$DEPLOYED_SHA" = "$GITHUB_SHA"
          echo "APP_COMMIT_SHA verified: $DEPLOYED_SHA"

          RECON=$(curl --silent --show-error --fail-with-body \
            --retry 2 --retry-all-errors --retry-delay 5 --max-time 180 \
            -X POST -H 'Content-Type: application/json' \
            -H "x-cron-secret: $CRON_SECRET" --data '{}' \
            "$URL/internal/cron/binance/spot-real-reconcile")
          jq -e '.real_mode == true and .spot_only == true and (.reconciliation.firestore_differences | type == "array")' <<<"$RECON" >/dev/null
          jq -e 'all(.reconciliation.firestore_differences[]; (.managed_quantity >= 0) and (.historical_unmanaged_quantity >= 0))' <<<"$RECON" >/dev/null
          echo '/internal/cron/binance/spot-real-reconcile verified with managed quantities'

          CYCLE=$(curl --silent --show-error --fail-with-body \
            --retry 1 --max-time 240 \
            -X POST -H 'Content-Type: application/json' \
            -H "x-cron-secret: $CRON_SECRET" --data '{}' \
            "$URL/internal/cron/binance/spot-real-execution")
          jq -e '.real_mode == true and .spot_only == true and (.decision_summary | type == "object") and (.evidence_id | type == "string")' <<<"$CYCLE" >/dev/null
          ! grep -q 'Invalid quantity' <<<"$CYCLE"
          jq -e 'all((.exits.outcomes // [])[]; .error != "Invalid quantity.")' <<<"$CYCLE" >/dev/null
          echo "Controlled real Spot cycle persisted: $(jq -r '.evidence_id' <<<"$CYCLE")"
          echo "XEC outcome: $(jq -c '(.exits.outcomes // [])[] | select(.symbol == "XECUSDT")' <<<"$CYCLE")"

          LIVE=$(curl --silent --show-error --fail-with-body \
            --retry 4 --retry-all-errors --retry-delay 5 --max-time 120 \
            -H "x-cron-secret: $CRON_SECRET" "$URL/internal/spot-live/evidence")
          jq -e '.ok == true and .real_mode == true and .spot_only == true and (.latest_cycle | type == "object") and (.activity | type == "array")' <<<"$LIVE" >/dev/null
          echo '/internal/spot-live/evidence verified'

          SUMMARY=$(curl --silent --show-error --fail-with-body \
            --retry 2 --retry-all-errors --retry-delay 5 --max-time 120 \
            -H "x-cron-secret: $CRON_SECRET" "$URL/internal/investments/summary")
          jq -e '.ok == true and (.portfolio_history | type == "array")' <<<"$SUMMARY" >/dev/null
          echo "XEC dashboard evidence: $(jq -c '(.portfolio_history // [])[] | select(.symbol == "XECUSDT") | {account_quantity,tracked_quantity,untracked_quantity,realized_pnl_usdt,unrealized_pnl_usdt,total_pnl_usdt}' <<<"$SUMMARY")"

          JOB=$(gcloud scheduler jobs list \
            --project=proypers2025 \
            --location=southamerica-east1 \
            --filter='httpTarget.uri:spot-real-execution' \
            --format='value(name)' | head -n1)
          test "$(gcloud scheduler jobs describe "$JOB" --project=proypers2025 --location=southamerica-east1 --format='value(state)')" = "PAUSED"
          echo 'Scheduler remains PAUSED after controlled retry'

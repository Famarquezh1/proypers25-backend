name: Activate controlled autonomous Spot

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: 'Escribe exactamente ACTIVAR_SPOT_CONTROLADO'
        required: true
        type: string

permissions:
  contents: read

jobs:
  activate:
    name: Apply safe Firestore configuration
    runs-on: ubuntu-latest
    if: ${{ inputs.confirmation == 'ACTIVAR_SPOT_CONTROLADO' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Apply controlled autonomous Spot configuration
        working-directory: backend
        env:
          GOOGLE_CLOUD_PROJECT: proypers2025
          GCLOUD_PROJECT: proypers2025
          CONFIRM_AUTONOMOUS_SPOT: ${{ inputs.confirmation }}
        run: node scripts/apply-controlled-autonomous-spot.js
